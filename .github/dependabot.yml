version: 2

updates:
  # npm — Eleventy + tsx (the site's only runtime deps).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    labels:
      - documentation

  # GitHub Actions — deploy workflow.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    labels:
      - documentation
